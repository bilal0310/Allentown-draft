<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0a0e1a" />
<title>Allentown Draft 2026 · Player Guide</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap');
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:#0a0e1a;}
  .sg{--bg:#0a0e1a;--bg2:#0f1526;--panel:#141b30;--panel2:#1a2340;--line:#26304d;
    --txt:#e8ecf6;--mut:#8a95b4;--amber:#FFB020;--mint:#63E6BE;
    min-height:100vh;background:var(--bg);color:var(--txt);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    max-width:760px;margin:0 auto;padding-bottom:40px}

  /* header */
  .sg-head{padding:20px 16px 14px;border-bottom:1px solid var(--line);background:var(--panel);
    position:sticky;top:0;z-index:5}
  .sg-title{font-family:'Barlow Condensed';font-weight:700;font-size:24px;letter-spacing:2px;line-height:1}
  .sg-title b{font-weight:800;color:var(--amber)}
  .sg-sub{font-size:11px;color:var(--mut);letter-spacing:1.2px;text-transform:uppercase;margin-top:4px}

  /* controls */
  .sg-controls{padding:12px 16px;border-bottom:1px solid var(--line);background:var(--bg2);
    position:sticky;top:71px;z-index:4}
  .sg-search{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--line);
    border-radius:8px;padding:10px 12px;margin-bottom:10px}
  .sg-search span{color:var(--mut);font-size:17px}
  .sg-search input{flex:1;background:transparent;border:0;color:var(--txt);font-size:16px;outline:none;
    font-family:'Inter';min-width:0}
  .sg-search button{background:none;border:0;color:var(--mut);font-size:22px;line-height:1;padding:0 2px}
  .sg-chips{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:10px;
    scrollbar-width:none}
  .sg-chips::-webkit-scrollbar{display:none}
  .sg-chip{flex-shrink:0;font-size:13px;font-weight:600;padding:7px 13px;border-radius:6px;
    border:1px solid var(--line);background:var(--panel);color:var(--mut);cursor:pointer;white-space:nowrap}
  .sg-chip.on{background:rgba(255,176,32,0.13);border-color:var(--amber);color:var(--amber)}
  .sg-sorts-lbl{display:block;font-size:10px;color:var(--mut);text-transform:uppercase;
    letter-spacing:1.2px;margin-bottom:5px}
  .sg-sorts-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none}
  .sg-sorts-row::-webkit-scrollbar{display:none}
  .sg-sort{flex-shrink:0;font-family:'Barlow Condensed';font-weight:700;font-size:14px;letter-spacing:.6px;
    padding:6px 12px;border-radius:6px;border:1px solid var(--line);background:var(--bg);
    color:var(--mut);cursor:pointer;white-space:nowrap;text-transform:uppercase}
  .sg-sort.on{background:var(--amber);border-color:var(--amber);color:#17130a}

  /* list */
  .sg-list{padding:12px 12px 0;display:flex;flex-direction:column;gap:8px}
  .sg-card{background:var(--panel);border:1px solid var(--line);border-radius:10px;overflow:hidden;
    position:relative}
  .sg-card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--tone)}
  .sg-card.open{border-color:var(--tone)}
  .sg-row{display:flex;align-items:center;gap:11px;width:100%;padding:11px 12px 11px 14px;
    background:none;border:0;color:var(--txt);text-align:left;cursor:pointer}
  .sg-pos{flex-shrink:0;width:22px;font-family:'Barlow Condensed';font-weight:700;font-size:16px;
    color:var(--mut);text-align:center}
  .sg-av{border-radius:7px;object-fit:cover;flex-shrink:0;border:1px solid rgba(255,255,255,.08)}
  .sg-av-init{display:flex;align-items:center;justify-content:center;font-family:'Barlow Condensed';
    font-weight:800;color:#fff}
  .sg-id{flex:1;min-width:0;display:flex;flex-direction:column;gap:1px}
  .sg-name{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sg-role{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.6px}
  .sg-badges{display:flex;flex-wrap:wrap;gap:6px;font-size:9px;font-weight:600;margin-top:2px}
  .sg-headline{flex-shrink:0;text-align:right}
  .sg-headline b{display:block;font-family:'Barlow Condensed';font-weight:800;font-size:22px;
    line-height:1;color:var(--tone)}
  .sg-headline i{font-style:normal;font-size:9px;color:var(--mut);text-transform:uppercase;letter-spacing:.5px}
  .sg-caret{flex-shrink:0;color:var(--mut);font-size:12px;width:12px}

  /* expanded detail */
  .sg-detail{padding:0 12px 14px 14px;border-top:1px solid var(--line);animation:sgOpen .18s ease}
  @keyframes sgOpen{from{opacity:0}to{opacity:1}}
  .sg-ranks{display:flex;gap:6px;flex-wrap:wrap;padding:12px 0}
  .sg-rank{flex:1;min-width:64px;background:var(--bg);border:1px solid var(--line);border-radius:7px;
    padding:7px 6px;text-align:center}
  .sg-rank b{display:block;font-family:'Barlow Condensed';font-weight:800;font-size:19px;line-height:1;
    color:var(--amber)}
  .sg-rank.fd b{color:var(--mint)}
  .sg-rank i{font-style:normal;display:block;font-size:8px;color:var(--mut);text-transform:uppercase;
    letter-spacing:.5px;margin-top:3px}
  .sg-sec{margin-top:10px}
  .sg-sec-lbl{font-size:10px;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:7px;font-weight:600}
  .sg-sec-lbl.amber{color:var(--amber)}
  .sg-sec-lbl.mint{color:var(--mint)}
  .sg-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .sg-stat{border-radius:6px;overflow:hidden;border:1px solid var(--line)}
  .sg-stat-k{background:var(--panel2);color:var(--mut);font-size:8px;font-weight:700;letter-spacing:.8px;
    text-transform:uppercase;text-align:center;padding:4px 2px}
  .sg-stat-v{background:var(--amber);color:#17130a;font-family:'Barlow Condensed';font-weight:800;
    font-size:20px;line-height:1;text-align:center;padding:6px 2px}
  .sg-stat.fd .sg-stat-v{background:var(--mint);color:#04231b}
  .sg-none{font-size:12px;color:var(--mut);padding:6px 0}
  .sg-honours{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px}
  .sg-honour{font-size:10px;font-weight:600;padding:4px 9px;border-radius:5px;color:var(--h);
    background:color-mix(in srgb,var(--h) 15%,transparent);
    border:1px solid color-mix(in srgb,var(--h) 45%,transparent)}

  .sg-empty{padding:40px 16px;text-align:center;color:var(--mut);font-size:14px}
  .sg-foot{padding:24px 16px;text-align:center;font-size:11px;color:var(--mut);line-height:1.7}

  /* larger screens: two columns of stats get roomier */
  @media (min-width:560px){
    .sg-grid{grid-template-columns:repeat(4,1fr)}
    .sg-name{font-size:16px}
    .sg-headline b{font-size:25px}
  }

  #boot{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
    background:#0a0e1a;color:#FFB020;font-family:system-ui,sans-serif;font-size:15px;letter-spacing:2px;z-index:99}
  #boot.hidden{display:none}
  #err{position:fixed;inset:0;display:none;flex-direction:column;gap:10px;align-items:center;justify-content:center;
    background:#0a0e1a;color:#ff6b76;font-family:system-ui,sans-serif;padding:24px;text-align:center;z-index:100}
  #err.show{display:flex}
  #err pre{color:#8a95b4;font-size:11px;max-width:92vw;overflow:auto;white-space:pre-wrap;text-align:left}
</style>
</head>
<body>
<div id="boot">LOADING PLAYER GUIDE…</div>
<div id="err"><div>Couldn't start the player guide.</div><pre id="errmsg"></pre></div>
<div id="root"></div>
